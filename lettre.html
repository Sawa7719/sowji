<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Une lettre pour toi</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="parchemin">


<div class="haut-parchemin"></div>



<h1>
Une lettre pour toi
</h1>



<div class="contenu-lettre">


<p id="dateLettre"></p>


<p id="texteLettre">

Cette lettre attend encore son histoire...

</p>



<div class="media">

<!-- Photo -->
<img id="photo" src="" alt="">


<!-- Vidéo -->
<video id="video" controls></video>


<!-- Musique -->
<audio id="musique" controls></audio>


</div>


</div>



<div class="bas-parchemin"></div>



<button onclick="retourJardin()">

Retour au jardin

</button>


</div>




<script>


const param =
new URLSearchParams(
window.location.search
);


const date =
new Date(
param.get("date")
);



document.getElementById("dateLettre").innerHTML =

date.toLocaleDateString(
"fr-FR",
{
day:"numeric",
month:"long",
year:"numeric"
}
);



document.getElementById("texteLettre").innerHTML =

`
Ma chère Sowji,

<br><br>

Aujourd’hui une nouvelle lettre arrive jusqu’à toi.

<br><br>

Ici viendra le message écrit avec le cœur.

<br><br>

Avec toute mon affection.
`;





function retourJardin(){

window.location.href =
"jardin.html";

}



</script>


</body>

</html>
