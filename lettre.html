<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Le parchemin</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="parchemin">


<h1 id="titreLettre">
📜 Une lettre pour toi
</h1>


<div class="sceau-date">

<span id="dateLettre"></span>

</div>



<div class="contenu-lettre">


<p id="texteLettre">
La lettre voyage encore...
</p>



<img id="photo" alt="">



<audio id="musique" autoplay loop></audio>



</div>



<button onclick="retourJardin()">

🌿 Retour au jardin

</button>


</div>





<script src="lettres.js"></script>


<script>


const parametres =
new URLSearchParams(
window.location.search
);



const date =
new Date(
parametres.get("date")
);



const cleDate =
date.toISOString().split("T")[0];



const titreLettre =
document.getElementById("titreLettre");


const texteLettre =
document.getElementById("texteLettre");


const dateLettre =
document.getElementById("dateLettre");


const photo =
document.getElementById("photo");


const musique =
document.getElementById("musique");




dateLettre.innerHTML =
date.toLocaleDateString(
"fr-FR",
{
day:"numeric",
month:"long",
year:"numeric"
}
);





let lettre = lettres[cleDate];




if(lettre){


titreLettre.innerHTML =
"📜 " + lettre.titre;



texteLettre.innerHTML =
lettre.texte;



if(lettre.photo){

photo.src = lettre.photo;

}

else{

photo.style.display="none";

}



if(lettre.musique){


musique.src =
lettre.musique;


musique.volume = 0.35;


musique.play().catch(()=>{

console.log("Lecture automatique bloquée par le navigateur");

});


}

else{

musique.style.display="none";

}


}

else{


titreLettre.innerHTML =
"📜 Lettre inconnue";


texteLettre.innerHTML =
"Cette lettre n'est pas encore arrivée.";


}




function retourJardin(){

window.location.href="jardin.html";

}


</script>


</body>

</html>
