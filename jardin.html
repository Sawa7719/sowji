<!DOCTYPE html
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ton jardin</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="jardin">


<h1>
🌿 Ton jardin 🌿
</h1>


<p class="phrase">

Un voyage écrit avec le cœur,<br>
jusqu'au plus beau des jours.

</p>



<div class="allee" id="chemin">

</div>



</div>



<script>


const chemin =
document.getElementById("chemin");



const debut =
new Date("2026-07-21");

const fin =
new Date("2026-08-30");


// Date de test
// À remplacer plus tard par la vraie date

const aujourdHui =
new Date("2026-07-21");





function afficherDate(date){

return date.toLocaleDateString(

"fr-FR",

{

day:"numeric",

month:"long"

}

);

}




let dateActuelle =
new Date(debut);

let compteur = 0;




while(dateActuelle <= fin){


let fleur =
document.createElement("div");



fleur.className =
"fleur-jardin";




let symbole;



if(dateActuelle < aujourdHui){

symbole="✿";

}

else if(
dateActuelle.getTime()
===
aujourdHui.getTime()

){

symbole="◇";

}

else{

symbole="☾";

}





fleur.innerHTML =

`

<div class="sceau-fleur">

${symbole}

</div>


<div class="date-fleur">

${afficherDate(dateActuelle)}

</div>

`;




let datePourLettre =
dateActuelle.toISOString();



let etat;



if(symbole==="☾"){

etat="fermee";

}

else{

etat="ouverte";

}





fleur.onclick=function(){


if(etat==="fermee"){

alert(
"Cette lettre poursuit encore son voyage..."
);

}

else{


window.location.href =
"lettre.html?date="
+ datePourLettre;


}


};




chemin.appendChild(fleur);



dateActuelle.setDate(

dateActuelle.getDate()+1

);



compteur++;


}



</script>


</body>

</html>
