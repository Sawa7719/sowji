<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Le Jardin de Sowji</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="jardin">


<h1>
✨ Le Jardin de Sowji ✨
</h1>


<p class="phrase">

Chaque fleur est une pensée déposée pour toi.

<br><br>

Certaines racontent un souvenir.

<br><br>

D'autres portent un conseil.

<br><br>

Toutes t'accompagnent jusqu'au plus beau des jours.

<br><br>

<span id="compteur"></span>

</p>


<div class="chemin" id="chemin"></div>


</div>



<script src="lettres.js"></script>


<script>


const chemin = document.getElementById("chemin");


const debut = new Date("2026-07-21");

const mariage = new Date("2026-08-21");

const fin = new Date("2026-08-30");


const maintenant = new Date();


maintenant.setHours(0,0,0,0);
mariage.setHours(0,0,0,0);
fin.setHours(0,0,0,0);



// ======================
// COMPTEUR
// ======================


let compteurTexte="";
let dateCible;



if(maintenant < mariage){

dateCible=mariage;

compteurTexte=
"Encore {jours} jours avant le grand jour 💍";


}

else if(maintenant < fin){

dateCible=fin;

compteurTexte=
"💍🥂Encore {jours} jours de festivité 🥂💍";


}

else{

compteurTexte=
"Maintenant commence votre FOREVER 💋";

}





if(dateCible){


let jours=Math.ceil(

(dateCible-maintenant)
/(1000*60*60*24)

);


compteurTexte=

compteurTexte.replace(

"{jours}",

jours

);


}



document.getElementById("compteur").innerHTML=
compteurTexte;






// ======================
// DATE
// ======================


function afficherDate(date){

return date.toLocaleDateString(

"fr-FR",

{

day:"numeric",

month:"long"

}

);

}





// ======================
// CREATION DES FLEURS
// ======================


let dateActuelle=new Date(debut);



while(dateActuelle <= fin){



let fleur=document.createElement("div");


let dateFleur=new Date(dateActuelle);


dateFleur.setHours(0,0,0,0);



let symbole="🌙";

let classe="";

let ouvrable=false;





if(dateFleur <= maintenant){


symbole="🪷";

classe="ouverte";

ouvrable=true;


}





// ROSE FINALE


if(dateFleur.getTime() === fin.getTime()){


symbole="🌹";

classe="finale";


if(dateFleur <= maintenant){

ouvrable=true;

document.body.classList.add("grand-jour");

}


}







fleur.className="fleur-jardin";



fleur.innerHTML=

`

<div class="sceau-fleur ${classe}">

${symbole}

</div>


<div class="date-fleur">

${afficherDate(dateFleur)}

</div>

`;







if(ouvrable){



fleur.onclick=function(){



// DERNIERE ROSE


if(dateFleur.getTime() === fin.getTime()){



let parchemin=document.createElement("div");



parchemin.className="parchemin-final";



parchemin.innerHTML=

`

<div class="couronne-finale">

👑

</div>


<h2>

Ma chère Sowji

</h2>


<p>

Toutes les fleurs de ce jardin ont grandi
jour après jour.

<br><br>

Chaque lettre était une petite partie de mon cœur.

<br><br>

Aujourd'hui, la dernière fleur s'ouvre.
<br><br>
Mais les plus belles histoires ne se terminent jamais.
<br><br>
Elles commencent simplement un nouveau chapitre.

<br><br>

C'est le début de votre FOREVER ❤️

<br><br>

🌹

</p>

`;



document.body.appendChild(parchemin);



}

else{



window.location.href =
"lettre.html?date="
+
dateFleur.getFullYear()
+
"-"
+
String(dateFleur.getMonth()+1).padStart(2,"0")
+
"-"
+
String(dateFleur.getDate()).padStart(2,"0");


}



};



}






chemin.appendChild(fleur);



dateActuelle.setDate(

dateActuelle.getDate()+1

);


}









// ======================
// SECRET DU 29 AOÛT
// ======================


let secret=new Date("2026-08-29");


secret.setHours(0,0,0,0);





if(maintenant.getTime() === secret.getTime()){



let message=document.createElement("div");



message.className="souvenir";



message.innerHTML=

`

👑

<br><br>

Le jardin semble arriver au bout du chemin...

<br><br>

Mais certains palais gardent encore un dernier secret.

<br><br>

Demain, une nouvelle histoire commencera.

`;



document.querySelector(".jardin")

.appendChild(message);



}









// ======================
// PLUIE D'ETOILES
// ======================


function creerEtoile(){



const etoiles=[

"✨",

"⭐",

"💛",

"❤️"

];



const p=document.createElement("div");



p.className="petale";



p.innerHTML=

etoiles[

Math.floor(

Math.random()*etoiles.length

)

];



p.style.left=

Math.random()*100+"vw";



p.style.fontSize=

(14+Math.random()*22)+"px";



p.style.animationDuration=

(6+Math.random()*6)+"s";



document.body.appendChild(p);



setTimeout(()=>{

p.remove();

},12000);



}



setInterval(creerEtoile,350);



</script>


</body>

</html>
